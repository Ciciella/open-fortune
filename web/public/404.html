<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open Fortune</title>
  <script>
    // 获取当前路径
    const path = window.location.pathname;
    // 获取基础路径（从 vite.config 中的 base 配置）
    const base = "/open-fortune/";
    // 如果路径以基础路径开头，则移除它
    const route = path.startsWith(base) ? path.slice(base.length) : path;
    // 重定向到 index.html 并保留完整路径（使用history模式）
    window.location.replace(base + 'index.html' + route);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
